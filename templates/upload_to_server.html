<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>上传到服务器</title>
    <meta name="renderer" content="webkit" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="/static/layui/css/layui.css" rel="stylesheet" />
    <style>
      #content {
        width: 95%;
        min-width: 800px;
        max-width: 2000px;
        margin: 40px auto 50px;
      }
      .layui-header {
        background: #16b777;
      }
      .section-title {
        font-size: 18px;
        margin: 15px 0;
        font-weight: bold;
      }
      #upload {
        display: block;
        margin-bottom: 10px;
        border-style: solid;
        padding: 30px 20px;
      }
      .file-info {
        margin-top: 10px;
        color: #333;
      }
      .layui-form-item {
        margin-bottom: 20px;
      }
      .history-table {
        margin-top: 20px;
      }
      .layui-table {
        table-layout: auto;
      }
      .layui-table th,
      .layui-table td {
        word-wrap: break-word;
        word-break: break-all;
        white-space: normal;
        vertical-align: middle;
        padding: 8px 10px;
      }
      .layui-table th {
        white-space: nowrap;
      }
      .layui-table td {
        max-width: 400px;
      }
      .file-name-cell {
        max-width: 300px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .file-name-cell:hover {
        white-space: normal;
        word-break: break-all;
      }
      .original-name-cell {
        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #666;
      }
      .original-name-cell:hover {
        white-space: normal;
        word-break: break-all;
      }
      .download-url-cell {
        max-width: 400px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .download-url-cell:hover {
        white-space: normal;
        word-break: break-all;
      }
      .layui-side {
        width: 200px;
        top: 60px;
        transition: margin-left 0.3s;
      }
      .layui-side.hide {
        margin-left: -200px;
      }
      .layui-body {
        top: 60px;
        padding: 15px;
        transition: left 0.3s;
      }
      .layui-body.sidebar-hidden {
        left: 0 !important;
      }
      .sidebar-toggle {
        position: fixed;
        left: 200px;
        top: 60px;
        z-index: 1000;
        background: #393D49;
        color: #fff;
        border: none;
        padding: 10px 5px;
        cursor: pointer;
        border-radius: 0 4px 4px 0;
        transition: left 0.3s;
      }
      .sidebar-toggle:hover {
        background: #2F3437;
      }
      .sidebar-toggle.sidebar-hidden {
        left: 0;
      }
      .progress-container {
        margin-top: 20px;
        display: none;
      }
      .progress-container.active {
        display: block;
      }
      .upload-result {
        margin-top: 20px;
        padding: 15px;
        background: #f0f9ff;
        border: 1px solid #b3d8ff;
        border-radius: 4px;
        display: none;
      }
      .upload-result.active {
        display: block;
      }
      .upload-logs {
        margin-top: 20px;
        display: none;
        border: 1px solid #e6e6e6;
        border-radius: 4px;
        background: #f8f8f8;
      }
      .upload-logs.active {
        display: block;
      }
      .upload-logs-header {
        padding: 10px 15px;
        background: #f0f0f0;
        border-bottom: 1px solid #e6e6e6;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .upload-logs-content {
        height: 300px;
        overflow-y: auto;
        padding: 10px 15px;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        line-height: 1.6;
        color: #333;
        background: #fff;
      }
      .upload-logs-content .log-line {
        margin: 2px 0;
        word-break: break-all;
      }
      .upload-logs-content .log-time {
        color: #999;
        margin-right: 8px;
      }
      .upload-logs-content .log-info {
        color: #1E9FFF;
      }
      .upload-logs-content .log-success {
        color: #5FB878;
      }
      .upload-logs-content .log-error {
        color: #FF5722;
      }
      .upload-logs-content .log-warning {
        color: #FFB800;
      }
      .clear-logs-btn {
        padding: 4px 10px;
        font-size: 12px;
        height: auto;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="layui-layout layui-layout-admin">
      <div class="layui-header" style="background: #16b777;z-index:1">
        <div class="layui-logo layui-hide-xs" style="color: #fff">上传到服务器</div>
      </div>
      {% include 'includes/sidebar.html' %}
      <!-- 内容主体区域 -->
      <div class="layui-body">
        <div id="content">
          <h2>上传语音文件到服务器</h2>
          <p>步骤：1）选择或拖拽音频/视频文件 2）自动上传到服务器 3）查看历史记录和下载链接。</p>

          <!-- 上传区域 -->
          <div class="layui-upload-drag layui-border-green" id="upload">
            <i class="layui-icon layui-icon-upload layui-font-green"></i>
            <div>点击上传，或将音频/视频文件拖拽到此处（mp4/wav/m4a/flac/aac/mp3 等）</div>
            <div id="uploaded-info" class="file-info"></div>
          </div>

          <!-- 上传进度条 -->
          <div class="progress-container" id="progress-container">
            <div class="layui-progress" lay-showpercent="true" lay-filter="upload-progress">
              <div class="layui-progress-bar" lay-percent="0%"></div>
            </div>
            <div id="progress-text" style="margin-top: 10px; color: #666;"></div>
          </div>

          <!-- 上传结果 -->
          <div class="upload-result" id="upload-result">
            <div id="result-content"></div>
          </div>

          <!-- 上传日志 -->
          <div class="upload-logs" id="upload-logs">
            <div class="upload-logs-header">
              <span>上传日志</span>
              <button type="button" class="layui-btn layui-btn-xs clear-logs-btn" onclick="clearUploadLogs()">清空日志</button>
            </div>
            <div class="upload-logs-content" id="upload-logs-content"></div>
          </div>

          <!-- 删除日志 -->
          <div class="upload-logs" id="delete-logs" style="display: none;">
            <div class="upload-logs-header">
              <span>删除日志</span>
              <button type="button" class="layui-btn layui-btn-xs clear-logs-btn" onclick="clearDeleteLogs()">清空日志</button>
            </div>
            <div class="upload-logs-content" id="delete-logs-content"></div>
          </div>

          <!-- 历史记录 -->
          <div class="history-table">
            <div class="section-title">
              上传历史记录
              <span id="history-load-time" style="font-size: 12px; color: #999; margin-left: 10px; display: none;"></span>
              <span id="cache-update-time" style="font-size: 12px; color: #1E9FFF; margin-left: 15px; display: none;"></span>
              <button type="button" class="layui-btn layui-btn-sm layui-btn-danger" id="batch-delete-btn" style="margin-left: 15px; display: none;" onclick="batchDeleteUploads()">批量删除</button>
            </div>
            <table class="layui-table" id="history-table">
              <thead>
                <tr>
                  <th style="width: 50px;"><input type="checkbox" id="select-all" lay-skin="primary" lay-filter="select-all"></th>
                  <th style="width: 60px;">ID</th>
                  <th style="min-width: 200px; max-width: 300px;">文件名</th>
                  <th style="min-width: 150px; max-width: 200px;">原文件中文名称</th>
                  <th style="width: 150px;">上传时间</th>
                  <th style="width: 100px;">文件大小</th>
                  <th style="width: 100px;">文件时长</th>
                  <th style="min-width: 200px; max-width: 400px;">下载链接</th>
                  <th style="width: 150px;">缓存更新时间</th>
                  <th style="width: 150px;">操作</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
            <!-- 删除进度条 -->
            <div class="progress-container" id="delete-progress-container" style="margin-top: 10px; display: none;">
              <div class="layui-progress" lay-showpercent="true" lay-filter="delete-progress">
                <div class="layui-progress-bar" lay-percent="0%"></div>
              </div>
              <div id="delete-progress-text" style="margin-top: 6px; color: #666;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/layui/layui.js"></script>
    <script>
      window.$ = layui.$;
      
      // 强制显示中文
      $("[data-cn]").each(function () {
        var $this = $(this);
        var text = $this.attr("data-cn");
        // 如果是菜单项，填充到 .menu-text 中
        var $menuText = $this.find(".menu-text");
        if ($menuText.length) {
          $menuText.text(text);
        } else {
          // 其他元素，追加文字
          $this.html($this.html() + text);
        }
      });
      
      layui.use(["upload", "layer", "element", "form"], function () {
        var upload = layui.upload;
        var layer = layui.layer;
        var element = layui.element;
        var form = layui.form;
        var $ = layui.$;
        
        // 渲染进度条
        element.render('progress');
        
        // 侧边栏隐藏/显示功能
        var sidebarHidden = false;
        $("#sidebar-toggle").click(function() {
          sidebarHidden = !sidebarHidden;
          if (sidebarHidden) {
            $("#sidebar").addClass("hide");
            $(".layui-body").addClass("sidebar-hidden");
            $(this).addClass("sidebar-hidden");
            $(this).find("i").removeClass("layui-icon-shrink-right").addClass("layui-icon-spread-left");
          } else {
            $("#sidebar").removeClass("hide");
            $(".layui-body").removeClass("sidebar-hidden");
            $(this).removeClass("sidebar-hidden");
            $(this).find("i").removeClass("layui-icon-spread-left").addClass("layui-icon-shrink-right");
          }
        });

        // 上传日志相关变量
        var uploadStartTime = null;
        var lastLoaded = 0;
        var lastTime = null;
        var uploadSpeed = 0;
        
        // 添加上传日志
        function addUploadLog(message, type) {
          var $logsContent = $("#upload-logs-content");
          var now = new Date();
          var timeStr = now.toLocaleTimeString() + "." + String(now.getMilliseconds()).padStart(3, '0');
          var typeClass = type || 'info';
          var $logLine = $('<div class="log-line"></div>');
          $logLine.append('<span class="log-time">[' + timeStr + ']</span>');
          $logLine.append('<span class="log-' + typeClass + '">' + message + '</span>');
          $logsContent.append($logLine);
          // 自动滚动到底部
          $logsContent.scrollTop($logsContent[0].scrollHeight);
        }
        
        // 清空上传日志
        window.clearUploadLogs = function() {
          $("#upload-logs-content").empty();
        }
        
        // 添加删除日志
        function addDeleteLog(message, type) {
          var $logsContent = $("#delete-logs-content");
          var now = new Date();
          var timeStr = now.toLocaleTimeString() + "." + String(now.getMilliseconds()).padStart(3, '0');
          var typeClass = type || 'info';
          var $logLine = $('<div class="log-line"></div>');
          $logLine.append('<span class="log-time">[' + timeStr + ']</span>');
          $logLine.append('<span class="log-' + typeClass + '">' + message + '</span>');
          $logsContent.append($logLine);
          // 自动滚动到底部
          $logsContent.scrollTop($logsContent[0].scrollHeight);
          // 显示删除日志区域
          $("#delete-logs").show();
        }
        
        // 清空删除日志
        window.clearDeleteLogs = function() {
          $("#delete-logs-content").empty();
        }
        
        // 计算上传速度
        function calculateSpeed(currentLoaded, currentTime) {
          if (!lastTime || !lastLoaded) {
            return 0;
          }
          var timeDiff = (currentTime - lastTime) / 1000; // 秒
          var loadedDiff = currentLoaded - lastLoaded; // 字节
          if (timeDiff > 0) {
            return loadedDiff / timeDiff; // 字节/秒
          }
          return 0;
        }
        
        // 计算剩余时间
        function calculateRemainingTime(loaded, total, speed) {
          if (speed <= 0) return "计算中...";
          var remaining = total - loaded;
          var seconds = Math.ceil(remaining / speed);
          if (seconds < 60) {
            return seconds + "秒";
          } else if (seconds < 3600) {
            return Math.floor(seconds / 60) + "分" + (seconds % 60) + "秒";
          } else {
            var hours = Math.floor(seconds / 3600);
            var minutes = Math.floor((seconds % 3600) / 60);
            return hours + "小时" + minutes + "分";
          }
        }
        
        // 文件上传（使用 XMLHttpRequest 实现进度条）
        var uploadBtn = $("#upload");
        uploadBtn.on("click", function() {
          var input = $('<input type="file" accept=".mp4,.mp3,.flac,.wav,.aac,.m4a,.avi,.mkv,.mpeg,.mov" style="display:none;">');
          $("body").append(input);
          input.click();
          
          input.on("change", function(e) {
            var file = e.target.files[0];
            if (!file) return;
            
            // 验证文件类型
            var ext = file.name.split('.').pop().toLowerCase();
            var allowedExts = ['mp4', 'mp3', 'flac', 'wav', 'aac', 'm4a', 'avi', 'mkv', 'mpeg', 'mov'];
            if (allowedExts.indexOf(ext) === -1) {
              layer.alert("不支持的文件格式", { title: false });
              input.remove();
              return;
            }
            
            // 重置变量
            uploadStartTime = new Date();
            lastLoaded = 0;
            lastTime = uploadStartTime;
            uploadSpeed = 0;
            
            // 准备上传
            $("#uploaded-info").text("准备上传: " + file.name);
            $("#progress-container").addClass("active");
            $("#upload-result").removeClass("active");
            $("#upload-logs").addClass("active");
            element.progress("upload-progress", "0%");
            $("#progress-text").text("0% - 开始上传...");
            
            // 清空之前的日志
            clearUploadLogs();
            
            // 添加初始日志
            var fileSize = formatFileSize(file.size);
            addUploadLog("准备上传文件: " + file.name, "info");
            addUploadLog("文件大小: " + fileSize, "info");
            addUploadLog("开始上传...", "info");
            
            // 使用 FormData 和 XMLHttpRequest 上传
            var formData = new FormData();
            formData.append("file", file);
            
            var xhr = new XMLHttpRequest();
            
            // 上传进度
            xhr.upload.addEventListener("progress", function(e) {
              if (e.lengthComputable) {
                var currentTime = new Date();
                var percent = Math.round((e.loaded / e.total) * 100);
                
                // 计算上传速度
                uploadSpeed = calculateSpeed(e.loaded, currentTime);
                lastLoaded = e.loaded;
                lastTime = currentTime;
                
                // 更新进度条
                element.progress("upload-progress", percent + "%");
                
                // 计算已用时间
                var elapsedTime = (currentTime - uploadStartTime) / 1000;
                var elapsedStr = elapsedTime < 60 ? elapsedTime.toFixed(1) + "秒" : 
                                 Math.floor(elapsedTime / 60) + "分" + (elapsedTime % 60).toFixed(1) + "秒";
                
                // 计算剩余时间
                var remainingTime = calculateRemainingTime(e.loaded, e.total, uploadSpeed);
                
                // 更新进度文本
                var speedStr = formatFileSize(uploadSpeed) + "/秒";
                $("#progress-text").text(percent + "% - 正在上传... (" + formatFileSize(e.loaded) + " / " + formatFileSize(e.total) + ")");
                
                // 每 500ms 更新一次日志（避免过于频繁）
                if (percent < 100 && (e.loaded % 50000 < 1000 || percent % 5 === 0)) {
                  var logMsg = "上传进度: " + percent + "% | 已上传: " + formatFileSize(e.loaded) + " / " + formatFileSize(e.total) + 
                               " | 速度: " + speedStr + " | 已用时间: " + elapsedStr + " | 剩余时间: " + remainingTime;
                  addUploadLog(logMsg, "info");
                }
                
                if (percent >= 100) {
                  // 文件上传完成，但服务器可能还在处理
                  $("#progress-text").text("100% - 上传完成，正在处理...");
                  addUploadLog("文件上传完成，等待服务器处理...", "info");
                }
              }
            }, false);
            
            // 上传完成
            xhr.addEventListener("load", function() {
              var totalTime = (new Date() - uploadStartTime) / 1000;
              var totalTimeStr = totalTime < 60 ? totalTime.toFixed(2) + "秒" : 
                                Math.floor(totalTime / 60) + "分" + (totalTime % 60).toFixed(2) + "秒";
              
              if (xhr.status === 200) {
                try {
                  var res = JSON.parse(xhr.responseText);
                  if (res.code !== 0) {
                    addUploadLog("上传失败: " + res.msg, "error");
                    layer.alert("上传失败：" + res.msg, { title: false });
                    $("#progress-container").removeClass("active");
                    return;
                  }
                  
                  // 文件上传完成，现在通过 SSE 获取后端处理进度
                  element.progress("upload-progress", "100%");
                  $("#progress-text").text("100% - 文件上传完成，等待服务器处理...");
                  addUploadLog("文件上传完成，开始服务器处理...", "info");
                  
                  // 通过 fetch 读取 SSE 流式响应
                  var tempFile = res.data.temp_file;
                  var formData = new FormData();
                  formData.append("temp_file", tempFile);
                  
                  fetch("/upload_to_server_process", {
                    method: "POST",
                    body: formData
                  }).then(function(response) {
                    if (!response.ok) {
                      throw new Error("HTTP " + response.status);
                    }
                    
                    var reader = response.body.getReader();
                    var decoder = new TextDecoder();
                    var buffer = "";
                    
                    function readStream() {
                      reader.read().then(function(result) {
                        if (result.done) {
                          return;
                        }
                        
                        buffer += decoder.decode(result.value, { stream: true });
                        var lines = buffer.split("\n");
                        buffer = lines.pop(); // 保留最后一行（可能不完整）
                        
                        for (var i = 0; i < lines.length; i++) {
                          var line = lines[i].trim();
                          if (!line) continue;
                          
                          if (line.startsWith("data: ")) {
                            var data = line.substring(6);
                            addUploadLog(data, "info");
                          } else if (line.startsWith("event: end")) {
                            // 下一行应该是 data: {...}
                            if (i + 1 < lines.length) {
                              var nextLine = lines[i + 1];
                              if (nextLine.startsWith("data: ")) {
                                try {
                                  var endData = JSON.parse(nextLine.substring(6));
                                  if (endData.code === 0) {
                                    element.progress("upload-progress", "100%");
                                    $("#progress-text").text("100% - 处理完成！");
                                    addUploadLog("服务器处理完成", "success");
                                    
                                    // 显示结果
                                    var record = endData.data;
                                    addUploadLog("新文件名: " + record.file_name, "success");
                                    addUploadLog("文件时长: " + record.file_duration_str, "success");
                                    addUploadLog("下载链接: " + record.download_url, "success");
                                    
                                    $("#result-content").html(`
                                      <h3 style="color: #5FB878;">✅ 上传成功！</h3>
                                      <p><strong>文件名：</strong>${record.file_name}</p>
                                      <p><strong>文件大小：</strong>${record.file_size_mb} MB</p>
                                      <p><strong>文件时长：</strong>${record.file_duration_str}</p>
                                      <p><strong>下载链接：</strong><a href="${record.download_url}" target="_blank">${record.download_url}</a></p>
                                    `);
                                    $("#upload-result").addClass("active");
                                    
                                    // 刷新历史记录
                                    setTimeout(function() {
                                      loadHistory();
                                    }, 500);
                                  } else {
                                    addUploadLog("处理失败: " + endData.msg, "error");
                                    layer.alert("处理失败：" + endData.msg, { title: false });
                                    $("#progress-container").removeClass("active");
                                  }
                                } catch (e) {
                                  addUploadLog("解析响应失败: " + e.message, "error");
                                }
                                i++; // 跳过下一行
                              }
                            }
                          }
                        }
                        
                        readStream();
                      }).catch(function(error) {
                        addUploadLog("读取流失败: " + error.message, "error");
                        $("#progress-container").removeClass("active");
                      });
                    }
                    
                    readStream();
                  }).catch(function(error) {
                    addUploadLog("SSE 连接错误: " + error.message, "error");
                    $("#progress-container").removeClass("active");
                  });
                  
                } catch (e) {
                  addUploadLog("解析响应失败: " + e.message, "error");
                  layer.alert("解析响应失败", { title: false });
                  $("#progress-container").removeClass("active");
                }
              } else {
                addUploadLog("上传失败，HTTP状态码: " + xhr.status, "error");
                addUploadLog("总耗时: " + totalTimeStr, "error");
                layer.alert("上传失败，HTTP状态码: " + xhr.status, { title: false });
                $("#progress-container").removeClass("active");
              }
            }, false);
            
            // 上传错误
            xhr.addEventListener("error", function() {
              var totalTime = uploadStartTime ? (new Date() - uploadStartTime) / 1000 : 0;
              var totalTimeStr = totalTime < 60 ? totalTime.toFixed(2) + "秒" : 
                                Math.floor(totalTime / 60) + "分" + (totalTime % 60).toFixed(2) + "秒";
              addUploadLog("上传失败，请检查网络或服务器配置", "error");
              addUploadLog("总耗时: " + totalTimeStr, "error");
              layer.alert("上传失败，请检查网络或服务器配置", { title: false });
              $("#progress-container").removeClass("active");
            }, false);
            
            // 上传中止
            xhr.addEventListener("abort", function() {
              addUploadLog("上传已取消", "warning");
              $("#progress-container").removeClass("active");
            }, false);
            
            // 开始上传
            xhr.open("POST", "/upload_to_server");
            xhr.send(formData);
            
            input.remove();
          });
        });
        
        // 格式化文件大小
        function formatFileSize(bytes) {
          if (bytes === 0) return "0 B";
          var k = 1024;
          var sizes = ["B", "KB", "MB", "GB"];
          var i = Math.floor(Math.log(bytes) / Math.log(k));
          return Math.round(bytes / Math.pow(k, i) * 100) / 100 + " " + sizes[i];
        }

        // 加载历史记录
        function loadHistory() {
          // 加载计时器
          var $timeLabel = $("#history-load-time");
          var seconds = 0;
          $timeLabel.text("（加载中 0 秒）").show();
          var timer = setInterval(function () {
            seconds += 1;
            $timeLabel.text("（加载中 " + seconds + " 秒）");
          }, 1000);

          $.get("/upload_history", function (res) {
            clearInterval(timer);
            console.log("[loadHistory] 接收到的数据:", res);
            if (res.code !== 0) {
              $timeLabel.text("（加载失败，用时 " + seconds + " 秒）");
              console.error("[loadHistory] 加载失败，code:", res.code, "msg:", res.msg);
              return;
            }
            $timeLabel.text("（加载完成，用时 " + seconds + " 秒）");
            
            // 显示缓存更新时间
            var $cacheTimeLabel = $("#cache-update-time");
            if (res.cache_info) {
              var cacheTime = res.cache_info.last_update || "未知";
              var isUpdating = res.cache_info.is_updating || false;
              var updateCount = res.cache_info.update_count || 0;
              var statusText = isUpdating ? "（更新中...）" : "";
              $cacheTimeLabel.text("缓存更新时间: " + cacheTime + statusText + " (更新次数: " + updateCount + ")").show();
            } else {
              $cacheTimeLabel.hide();
            }
            
            // 若想几秒后隐藏，可解除下一行注释
            // setTimeout(function(){ $timeLabel.hide(); }, 3000);
            var tbody = $("#history-table tbody");
            tbody.empty();
            console.log("[loadHistory] res.data:", res.data, "长度:", res.data ? res.data.length : 0);
            if (!res.data || !res.data.length) {
              console.warn("[loadHistory] 没有数据或数据为空");
              tbody.append("<tr><td colspan='10'>暂无记录</td></tr>");
              $("#batch-delete-btn").hide();
              return;
            }
            
            // 获取缓存更新时间（所有记录共用同一个缓存时间）
            var cacheUpdateTime = res.cache_info ? (res.cache_info.last_update || "未知") : "未知";
            
            res.data.forEach(function (item, index) {
              console.log("[loadHistory] 处理第", index + 1, "条记录:", item);
              var originalName = item.original_name || '';
              var originalNameDisplay = originalName || '-';
              var originalNameTitle = originalName || '暂无中文名称';
              var tr = `
                <tr data-id="${item.id || ''}">
                  <td><input type="checkbox" class="row-checkbox" lay-skin="primary" data-id="${item.id || ''}"></td>
                  <td>${item.id || index + 1}</td>
                  <td class="file-name-cell" title="${item.file_name}">${item.file_name}</td>
                  <td class="original-name-cell" title="${originalNameTitle}">${originalNameDisplay}</td>
                  <td>${item.upload_time || ""}</td>
                  <td>${item.file_size_mb !== undefined ? item.file_size_mb + ' MB' : ((item.file_size / (1024 * 1024)).toFixed(2) + ' MB')}</td>
                  <td>${item.file_duration_str || formatDuration(item.file_duration || 0)}</td>
                  <td class="download-url-cell"><a href="${item.download_url}" target="_blank" style="color: #1E9FFF;">${item.download_url}</a></td>
                  <td title="服务器文件列表的缓存更新时间">${cacheUpdateTime}</td>
                  <td>
                    <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" onclick="copyUrl('${item.download_url}')">复制链接</button>
                    ${
                      item.id
                        ? `<button type="button" class="layui-btn layui-btn-sm layui-btn-danger" onclick="deleteUpload('${item.id}', this)">删除</button>`
                        : ''
                    }
                  </td>
                </tr>
              `;
              tbody.append(tr);
            });
            
            // 渲染复选框
            form.render('checkbox');
            
            // 确保全选复选框事件绑定（在数据加载后重新绑定）
            // 注意：由于使用了 $(document).on，不需要重新绑定
            
            // 更新批量删除按钮显示状态
            updateBatchDeleteButton();
            
            // 重置全选复选框状态
            $("#select-all").prop('checked', false);
            form.render('checkbox');
            
            console.log("[loadHistory] 共添加", res.data.length, "条记录到表格");
          }).fail(function(xhr, status, error) {
            clearInterval(timer);
            console.error("[loadHistory] 请求失败:", status, error);
            $timeLabel.text("（加载失败，用时 " + seconds + " 秒）");
            var tbody = $("#history-table tbody");
            tbody.empty();
            tbody.append("<tr><td colspan='10'>加载失败: " + error + "</td></tr>");
            $("#batch-delete-btn").hide();
          });
        }
        
        // 格式化时长
        function formatDuration(seconds) {
          if (!seconds || seconds <= 0) return "00:00:00";
          var hours = Math.floor(seconds / 3600);
          var minutes = Math.floor((seconds % 3600) / 60);
          var secs = Math.floor(seconds % 60);
          return (hours < 10 ? "0" : "") + hours + ":" + 
                 (minutes < 10 ? "0" : "") + minutes + ":" + 
                 (secs < 10 ? "0" : "") + secs;
        }
        
        // 复制链接函数（全局）
        window.copyUrl = function(url) {
          var tempInput = $("<input>");
          $("body").append(tempInput);
          tempInput.val(url).select();
          document.execCommand("copy");
          tempInput.remove();
          layer.msg("链接已复制到剪贴板", { icon: 1, time: 1000 });
        };

        // 删除上传记录（同时删除服务器文件和数据库记录）
        window.deleteUpload = function(id, btn) {
          if (!id) {
            layer.msg("记录ID缺失，无法删除", { icon: 2, time: 1500 });
            return;
          }
          
          // 获取文件信息用于日志显示
          var $tr = $(btn).closest("tr");
          var fileName = $tr.find("td:eq(1)").text().trim() || "未知文件";
          
          layer.confirm("确定要删除这条记录以及服务器上的文件吗？", {icon: 3, title: "提示", btn: ["确定", "取消"]}, function(index) {
            layer.close(index);
            
            // 显示删除日志区域
            $("#delete-logs").show();
            addDeleteLog("=".repeat(60), "info");
            addDeleteLog("开始删除文件: " + fileName + " (ID: " + id + ")", "info");
            
            // 显示删除进度条
            $("#delete-progress-container").show();
            element.progress("delete-progress", "0%");
            $("#delete-progress-text").text("0% - 开始删除...");
            addDeleteLog("0% - 开始删除...", "info");

            // 实时更新进度和日志
            var progressSteps = [
              { percent: 20, text: "20% - 正在连接服务器...", log: "正在连接服务器..." },
              { percent: 40, text: "40% - 正在删除服务器文件...", log: "正在删除服务器文件..." },
              { percent: 60, text: "60% - 服务器文件已删除", log: "✓ 服务器文件删除成功" },
              { percent: 80, text: "80% - 正在删除数据库记录...", log: "正在删除数据库记录..." },
              { percent: 100, text: "100% - 删除完成", log: "✓ 数据库记录删除成功" }
            ];
            
            var currentStep = 0;
            var progressInterval = setInterval(function() {
              if (currentStep < progressSteps.length - 1) {
                var step = progressSteps[currentStep];
                element.progress("delete-progress", step.percent + "%");
                $("#delete-progress-text").text(step.text);
                addDeleteLog(step.log, currentStep === 2 || currentStep === 4 ? "success" : "info");
                currentStep++;
              }
            }, 300);

            $.post("/delete_upload", { id: id }, function(res) {
              clearInterval(progressInterval);
              if (res.code === 0) {
                element.progress("delete-progress", "100%");
                $("#delete-progress-text").text("100% - 删除完成（服务器文件和数据库记录已删除）");
                addDeleteLog("100% - 删除完成", "success");
                addDeleteLog("✓ " + (res.msg || "删除成功"), "success");
                addDeleteLog("=".repeat(60), "info");
                
                // 从表格中移除该行
                if (btn) {
                  $tr.fadeOut(300, function() {
                    $(this).remove();
                    // 如果表格空了，提示暂无记录
                    if ($("#history-table tbody tr").length === 0) {
                      $("#history-table tbody").append("<tr><td colspan='10'>暂无记录</td></tr>");
                    }
                    updateBatchDeleteButton();
                  });
                } else {
                  // 兜底：重新加载历史
                  loadHistory();
                }
                layer.msg(res.msg || "删除成功", { icon: 1, time: 1500 });
                setTimeout(function () {
                  $("#delete-progress-container").hide();
                }, 1500);
              } else {
                clearInterval(progressInterval);
                element.progress("delete-progress", "0%");
                $("#delete-progress-text").text("删除失败: " + (res.msg || "未知错误"));
                addDeleteLog("✗ 删除失败: " + (res.msg || "未知错误"), "error");
                addDeleteLog("=".repeat(60), "info");
                layer.msg(res.msg || "删除失败", { icon: 2, time: 2000 });
                setTimeout(function () {
                  $("#delete-progress-container").hide();
                }, 2000);
              }
            }).fail(function(xhr, status, error) {
              clearInterval(progressInterval);
              element.progress("delete-progress", "0%");
              $("#delete-progress-text").text("删除失败：网络或服务器错误 (" + error + ")");
              addDeleteLog("✗ 删除失败：网络或服务器错误 (" + error + ")", "error");
              addDeleteLog("=".repeat(60), "info");
              layer.msg("删除失败，请检查网络或服务器", { icon: 2, time: 2000 });
              setTimeout(function () {
                $("#delete-progress-container").hide();
              }, 2000);
            });
          });
        };

        // 全选/取消全选 - 同时支持 layui 事件和原生事件
        form.on('checkbox(select-all)', function(data) {
          var checked = data.elem.checked;
          console.log("[全选-layui] 全选状态:", checked);
          setAllCheckboxes(checked);
        });
        
        // 也监听原生事件（作为备用）
        $(document).on('change', '#select-all', function() {
          var checked = this.checked;
          console.log("[全选-原生] 全选状态:", checked);
          setAllCheckboxes(checked);
        });
        
        // 统一设置所有复选框状态的函数
        function setAllCheckboxes(checked) {
          $('.row-checkbox').each(function() {
            var $checkbox = $(this);
            var checkbox = this;
            // 设置原生 checkbox 的 checked 属性
            checkbox.checked = checked;
            // 同时设置 jQuery 的 prop
            $checkbox.prop('checked', checked);
            
            // 更新 layui 生成的 DOM 结构
            // layui 会在 checkbox 后面生成一个 <i> 标签
            var $parent = $checkbox.parent();
            if ($parent.hasClass('layui-form-checkbox')) {
              if (checked) {
                $parent.addClass('layui-form-checked');
                $parent.find('i').addClass('layui-icon-ok');
              } else {
                $parent.removeClass('layui-form-checked');
                $parent.find('i').removeClass('layui-icon-ok');
              }
            }
          });
          // 更新批量删除按钮
          updateBatchDeleteButton();
        }
        
        // 单个复选框变化 - 使用原生事件监听
        $(document).on('change', '.row-checkbox', function() {
          updateBatchDeleteButton();
          updateSelectAllCheckbox();
        });
        
        // 更新批量删除按钮显示状态
        function updateBatchDeleteButton() {
          var checkedCount = $('.row-checkbox:checked').length;
          var $batchBtn = $("#batch-delete-btn");
          console.log("[updateBatchDeleteButton] 选中数量:", checkedCount);
          if (checkedCount > 0) {
            $batchBtn.css('display', 'inline-block').text("批量删除 (" + checkedCount + ")");
          } else {
            $batchBtn.hide();
          }
        }
        
        // 更新全选复选框状态
        function updateSelectAllCheckbox() {
          var totalCount = $('.row-checkbox').length;
          var checkedCount = $('.row-checkbox:checked').length;
          var $selectAll = $("#select-all");
          if (totalCount === 0) {
            $selectAll.prop('checked', false);
          } else {
            $selectAll.prop('checked', checkedCount === totalCount);
          }
          form.render('checkbox');
        }
        
        // 批量删除
        window.batchDeleteUploads = function() {
          var checkedIds = [];
          $('.row-checkbox:checked').each(function() {
            var id = $(this).data('id');
            if (id) {
              checkedIds.push(id);
            }
          });
          
          if (checkedIds.length === 0) {
            layer.msg("请至少选择一条记录", { icon: 2, time: 1500 });
            return;
          }
          
          layer.confirm("确定要删除选中的 " + checkedIds.length + " 条记录以及服务器上的文件吗？", 
            {icon: 3, title: "提示", btn: ["确定", "取消"]}, 
            function(index) {
              layer.close(index);
              
              // 显示删除日志区域
              $("#delete-logs").show();
              addDeleteLog("=".repeat(60), "info");
              addDeleteLog("开始批量删除 " + checkedIds.length + " 个文件", "info");
              
              // 显示删除进度条
              $("#delete-progress-container").show();
              element.progress("delete-progress", "0%");
              $("#delete-progress-text").text("0% - 开始批量删除...");
              addDeleteLog("0% - 开始批量删除...", "info");
              
              // 发送批量删除请求
              $.post("/batch_delete_upload", { ids: JSON.stringify(checkedIds) }, function(res) {
                if (res.code === 0) {
                  element.progress("delete-progress", "100%");
                  $("#delete-progress-text").text("100% - 批量删除完成");
                  addDeleteLog("100% - 批量删除完成", "success");
                  addDeleteLog("✓ 成功删除 " + (res.data.success_count || 0) + " 条记录", "success");
                  if (res.data.failed_count > 0) {
                    addDeleteLog("✗ 失败 " + res.data.failed_count + " 条记录", "error");
                    if (res.data.failed_ids && res.data.failed_ids.length > 0) {
                      addDeleteLog("失败ID: " + res.data.failed_ids.join(", "), "error");
                    }
                  }
                  addDeleteLog("=".repeat(60), "info");
                  
                  // 刷新历史记录
                  loadHistory();
                  
                  layer.msg("批量删除完成", { icon: 1, time: 2000 });
                  setTimeout(function () {
                    $("#delete-progress-container").hide();
                  }, 2000);
                } else {
                  element.progress("delete-progress", "0%");
                  $("#delete-progress-text").text("批量删除失败: " + (res.msg || "未知错误"));
                  addDeleteLog("✗ 批量删除失败: " + (res.msg || "未知错误"), "error");
                  addDeleteLog("=".repeat(60), "info");
                  layer.msg(res.msg || "批量删除失败", { icon: 2, time: 2000 });
                  setTimeout(function () {
                    $("#delete-progress-container").hide();
                  }, 2000);
                }
              }).fail(function(xhr, status, error) {
                element.progress("delete-progress", "0%");
                $("#delete-progress-text").text("批量删除失败：网络或服务器错误 (" + error + ")");
                addDeleteLog("✗ 批量删除失败：网络或服务器错误 (" + error + ")", "error");
                addDeleteLog("=".repeat(60), "info");
                layer.msg("批量删除失败，请检查网络或服务器", { icon: 2, time: 2000 });
                setTimeout(function () {
                  $("#delete-progress-container").hide();
                }, 2000);
              });
            }
          );
        };

        // 页面加载时加载历史记录
        loadHistory();
      });
    </script>
  </body>
</html>
