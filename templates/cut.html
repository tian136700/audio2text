<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>音频截取工具</title>
    <meta name="renderer" content="webkit" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="/static/layui/css/layui.css" rel="stylesheet" />
    <style>
      html, body {
        height: 100%;
        overflow: hidden;
      }
      #content {
        width: 95%;
        min-width: 800px;
        max-width: 2000px;
        margin: 40px auto 50px;
        padding-bottom: 20px;
      }
      .layui-header {
        background: #16b777;
      }
      .section-title {
        font-size: 18px;
        margin: 15px 0;
      }
      #upload {
        display: block;
        margin-bottom: 10px;
        border-style: solid;
        padding: 30px 20px;
      }
      .file-info {
        margin-top: 10px;
        color: #333;
      }
      .time-inputs {
        margin-top: 20px;
      }
      .time-group {
        display: flex;
        align-items: center;
      }
      .time-group input {
        width: 70px;
        text-align: center;
      }
      .time-separator {
        padding: 0 5px;
      }
      .time-help {
        color: #999;
        font-size: 12px;
        line-height: 1.5;
      }
      .layui-form-item {
        margin-bottom: 20px;
      }
      .history-table {
        margin-top: 20px;
      }
      .tree-row {
        cursor: pointer;
        user-select: none;
      }
      .tree-row:hover {
        background-color: #f5f5f5;
      }
      .tree-row.expanded {
        background-color: #f0f9ff;
      }
      .tree-icon {
        display: inline-block;
        width: 16px;
        text-align: center;
        margin-right: 5px;
      }
      .child-row {
        display: none;
        background-color: #fafafa;
      }
      .child-row.show {
        display: table-row;
      }
      .child-row td:first-child {
        padding-left: 40px;
      }
      .child-row td {
        border-top: 1px solid #e6e6e6;
      }
      .upload-logs-container {
        margin-top: 20px;
        display: none;
        border: 1px solid #e6e6e6;
        border-radius: 4px;
        background: #f8f8f8;
      }
      .upload-logs-container.active {
        display: block;
      }
      .upload-logs-header {
        padding: 10px 15px;
        background: #f0f0f0;
        border-bottom: 1px solid #e6e6e6;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .upload-logs-content {
        height: 200px;
        overflow-y: auto;
        padding: 10px 15px;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        line-height: 1.6;
        color: #333;
        background: #fff;
      }
      .upload-logs-content .log-line {
        margin: 2px 0;
        word-break: break-all;
      }
      .upload-logs-content .log-time {
        color: #999;
        margin-right: 8px;
      }
      .upload-logs-content .log-info {
        color: #1E9FFF;
      }
      .upload-logs-content .log-success {
        color: #5FB878;
      }
      .upload-logs-content .log-error {
        color: #FF5722;
      }
      .layui-side {
        width: 200px;
        top: 60px;
        transition: margin-left 0.3s;
      }
      .layui-side.hide {
        margin-left: -200px;
      }
      .layui-body {
        top: 60px;
        bottom: 0;
        left: 200px;
        right: 0;
        padding: 15px;
        transition: left 0.3s;
        overflow-y: auto;
        overflow-x: hidden;
        position: fixed;
      }
      .layui-body.sidebar-hidden {
        left: 0 !important;
      }
      .sidebar-toggle {
        position: fixed;
        left: 200px;
        top: 60px;
        z-index: 1000;
        background: #393D49;
        color: #fff;
        border: none;
        padding: 10px 5px;
        cursor: pointer;
        border-radius: 0 4px 4px 0;
        transition: left 0.3s;
      }
      .sidebar-toggle:hover {
        background: #2F3437;
      }
      .sidebar-toggle.sidebar-hidden {
        left: 0;
      }

      /* =========================
         Responsive improvements
         ========================= */
      .action-buttons {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
      }
      .action-buttons .layui-btn {
        margin-left: 0 !important;
      }
      .action-buttons a.layui-btn {
        display: inline-flex;
        align-items: center;
      }
      .server-link {
        word-break: break-all;
        display: inline-block;
        max-width: min(520px, 60vw);
      }

      @media (max-width: 900px) {
        html, body {
          overflow: auto;
        }
        #content {
          width: 100%;
          min-width: 0;
          margin: 15px auto 30px;
        }
        .layui-body {
          position: relative;
          left: 0;
          right: 0;
          overflow: visible;
        }
      }
    </style>
  </head>
  <body>
    <div class="layui-layout layui-layout-admin">
      <div class="layui-header" style="background: #16b777;z-index:1">
        <div class="layui-logo layui-hide-xs" style="color: #fff">音频截取工具</div>
      </div>
      {% include 'includes/sidebar.html' %}
      <!-- 内容主体区域 -->
      <div class="layui-body">
        <div id="content">
      <h2>音频截取工具</h2>
      <p>步骤：1）上传音频 2）输入开始/结束时间（格式 00:00:00）3）点击“截取并保存”。</p>

      <!-- 上传区域 -->
      <div class="layui-upload-drag layui-border-green" id="upload">
        <i class="layui-icon layui-icon-upload layui-font-green"></i>
        <div>点击上传，或将音频/视频文件拖拽到此处（mp3/mp4/wav/m4a 等）</div>
        <div id="uploaded-info" class="file-info"></div>
      </div>

      <!-- 预览 -->
      <div id="audio-preview" class="file-info"></div>

      <!-- 时间输入和操作 -->
      <div class="time-inputs">
        <div class="layui-form layui-form-pane">
          <div class="layui-form-item">
            <label class="layui-form-label">开始时间</label>
            <div class="layui-input-inline time-group">
              <input
                type="text"
                id="start-h"
                value="00"
                maxlength="2"
                class="layui-input"
              />
              <span class="time-separator">时</span>
              <input
                type="text"
                id="start-m"
                value="00"
                maxlength="2"
                class="layui-input"
              />
              <span class="time-separator">分</span>
              <input
                type="text"
                id="start-s"
                value="00"
                maxlength="2"
                class="layui-input"
              />
              <span class="time-separator">秒</span>
            </div>
          </div>

          <div class="layui-form-item">
            <div class="layui-input-block">
              <span class="time-help">为空时自动按 00 处理，例如 00时01分30秒</span>
            </div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">结束时间</label>
            <div class="layui-input-inline time-group">
              <input
                type="text"
                id="end-h"
                value="00"
                maxlength="2"
                class="layui-input"
              />
              <span class="time-separator">时</span>
              <input
                type="text"
                id="end-m"
                value="00"
                maxlength="2"
                class="layui-input"
              />
              <span class="time-separator">分</span>
              <input
                type="text"
                id="end-s"
                value="00"
                maxlength="2"
                class="layui-input"
              />
              <span class="time-separator">秒</span>
            </div>
          </div>

          <div class="layui-form-item">
            <div class="layui-input-block">
              <span class="time-help">必须大于开始时间</span>
            </div>
          </div>

          <div class="layui-form-item">
            <button
              type="button"
              class="layui-btn layui-btn-danger"
              id="cut-btn"
            >
              截取并保存
            </button>
          </div>
        </div>
      </div>

      <!-- 截取结果 -->
      <div id="cut-result" class="file-info"></div>

      <!-- 历史记录 -->
      <div class="history-table">
        <div class="section-title">历史截取记录</div>
        <table class="layui-table" id="history-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>文件名</th>
              <th>截取时间段</th>
              <th>截取时长</th>
              <th>大小 (MB)</th>
              <th>操作时间</th>
              <th>服务器链接</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- 上传日志 -->
      <div class="upload-logs-container" id="upload-logs-container">
        <div class="upload-logs-header">
          <span>上传日志</span>
          <button type="button" class="layui-btn layui-btn-xs" onclick="clearUploadLogs()">清空日志</button>
        </div>
        <div class="upload-logs-content" id="upload-logs-content"></div>
      </div>
    </div>

    <script src="/static/layui/layui.js"></script>
    <script>
      let language = "zh"; // 强制使用中文
      window.$ = layui.$;
      
      // 强制显示中文
      $("[data-cn]").each(function () {
        var $this = $(this);
        var text = $this.attr("data-cn");
        // 如果是菜单项，填充到 .menu-text 中
        var $menuText = $this.find(".menu-text");
        if ($menuText.length) {
          $menuText.text(text);
        } else {
          // 其他元素，追加文字
          $this.html($this.html() + text);
        }
      });
      
      layui.use(["upload", "layer", "element"], function () {
        var upload = layui.upload;
        var layer = layui.layer;
        var $ = layui.$;
        var element = layui.element;

        // 侧边栏隐藏/显示功能
        var sidebarHidden = false;
        $("#sidebar-toggle").click(function() {
          sidebarHidden = !sidebarHidden;
          if (sidebarHidden) {
            $("#sidebar").addClass("hide");
            $(".layui-body").addClass("sidebar-hidden");
            $(this).addClass("sidebar-hidden");
            $(this).find("i").removeClass("layui-icon-shrink-right").addClass("layui-icon-spread-left");
          } else {
            $("#sidebar").removeClass("hide");
            $(".layui-body").removeClass("sidebar-hidden");
            $(this).removeClass("sidebar-hidden");
            $(this).find("i").removeClass("layui-icon-spread-left").addClass("layui-icon-shrink-right");
          }
        });

        var currentWav = null; // 当前上传的文件名（保持原始格式）

        // 上传
        upload.render({
          elem: "#upload",
          field: "audio",
          accept: "file",
          exts: "mp4|mp3|flac|wav|aac|m4a|avi|mkv|mpeg|mov",
          multiple: false,
          url: "/upload",
          before: function () {
            currentWav = null;
            $("#uploaded-info").text("正在上传，请稍候...");
            $("#audio-preview").html("");
          },
          done: function (res) {
            if (res.code !== 0) {
              layer.alert("上传失败：" + res.msg, { title: false });
              return;
            }
            currentWav = res.data;
            $("#uploaded-info").text("上传成功: " + currentWav);
            $("#audio-preview").html(
              '<audio src="/static/tmp/' +
                currentWav +
                '" controls style="width: 100%;"></audio>'
            );
          },
          error: function () {
            layer.alert("上传失败，请重试", { title: false });
          },
        });

        function buildTime(h, m, s) {
          function pad(v) {
            v = (v || "").trim();
            if (!v) return "00";
            if (!/^\d+$/.test(v)) return "00";
            if (v.length === 1) return "0" + v;
            return v.slice(-2);
          }
          return pad(h) + ":" + pad(m) + ":" + pad(s);
        }

        // 截取按钮
        $("#cut-btn").click(function () {
          if (!currentWav) {
            layer.alert("请先上传要截取的音频文件！", { title: false });
            return;
          }
          var startTime = buildTime(
            $("#start-h").val(),
            $("#start-m").val(),
            $("#start-s").val()
          );
          var endTime = buildTime(
            $("#end-h").val(),
            $("#end-m").val(),
            $("#end-s").val()
          );

          layer.load();
          $.post(
            "/cut_audio",
            {
              wav_name: currentWav,
              start_time: startTime,
              end_time: endTime,
            },
            function (res) {
              layer.closeAll("loading");
              if (res.code !== 0) {
                layer.alert("截取失败：" + res.msg, { title: false });
                return;
              }
              $("#cut-result").html(
                `截取成功：${res.file_name}&nbsp;&nbsp;<button type="button" class="layui-btn layui-btn-sm" onclick="window.open('${res.url}', '_blank')">下载</button>`
              );
              loadHistory();
            }
          ).fail(function () {
            layer.closeAll("loading");
            layer.alert("请求失败，请检查网络或后端服务", { title: false });
          });
        });

        function loadHistory() {
          $.get("/cut_history?grouped=true&check_uploaded=true", function (res) {
            // 调试：打印接收到的数据
            console.log("[loadHistory] 接收到的数据:", res);
            if (res.code !== 0) {
              return;
            }
            var tbody = $("#history-table tbody");
            tbody.empty();
            if (!res.data || !res.data.length) {
              tbody.append("<tr><td colspan='9'>暂无记录</td></tr>");
              return;
            }
            
            // 树形结构显示
            res.data.forEach(function (group, groupIndex) {
              var groupId = "group_" + groupIndex;
              
              // 一级菜单：原始录音文件名
              var groupRow = `
                <tr class="tree-row" data-group-id="${groupId}" onclick="toggleGroup('${groupId}')">
                  <td>
                    <span class="tree-icon" id="icon_${groupId}">▶</span>
                    <strong>${group.original_name}</strong>
                  </td>
                  <td>
                    <span style="color: #999; font-size: 12px;">共 ${group.segment_count} 个截取片段</span>
                  </td>
                  <td>-</td>
                  <td>-</td>
                  <td>${group.total_size_mb.toFixed(2)} MB</td>
                  <td>${group.latest_time_str || ""}</td>
                  <td>-</td>
                  <td>
                    <div class="action-buttons">
                      <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" onclick="event.stopPropagation(); toggleGroup('${groupId}')">
                        <span id="btn_text_${groupId}">展开</span>
                      </button>
                      ${group.all_uploaded ? 
                        '<button type="button" class="layui-btn layui-btn-sm layui-btn-disabled" disabled>全部已上传</button>' :
                        `<button type="button" class="layui-btn layui-btn-sm layui-btn-normal" onclick="event.stopPropagation(); uploadGroup('${group.original_name}', '${groupId}')">上传全部</button>`
                      }
                      <button type="button" class="layui-btn layui-btn-sm layui-btn-danger" onclick="event.stopPropagation(); deleteGroup('${group.original_name}', '${groupId}')">
                        删除全部
                      </button>
                    </div>
                  </td>
                </tr>
              `;
              tbody.append(groupRow);
              
              // 二级菜单：截取片段（初始隐藏）
              group.segments.forEach(function (item, index) {
                // 调试：打印每个文件的上传状态
                console.log(`[loadHistory] 文件: ${item.file_name}, is_uploaded: ${item.is_uploaded}`);
                
                var childRowId = groupId + "_child_" + index;
                var uploadButton = '';
                var serverLink = '';
                if (item.is_uploaded === true || item.is_uploaded === 'true') {
                  uploadButton = '<button type="button" class="layui-btn layui-btn-sm layui-btn-disabled" disabled>已上传</button>';
                  // 显示服务器链接
                  if (item.upload_info && item.upload_info.download_url) {
                    serverLink = '<a class="server-link" href="' + item.upload_info.download_url + '" target="_blank" style="color: #1E9FFF; text-decoration: underline;">' + item.upload_info.download_url + '</a>';
                  } else {
                    serverLink = '<span style="color: #999;">-</span>';
                  }
                } else {
                  uploadButton = '<button type="button" class="layui-btn layui-btn-sm layui-btn-normal" onclick="uploadCutFile(\'' + item.file_name + '\', this)">上传</button>';
                  serverLink = '<span style="color: #999;">未上传</span>';
                }
                
                var childRow = `
                  <tr class="child-row" id="${childRowId}" data-group-id="${groupId}">
                    <td>${index + 1}</td>
                    <td>${item.file_name}</td>
                    <td>${item.time_range || "00:00:00-00:00:00"}</td>
                    <td>${item.duration || "00:00:00"}</td>
                    <td>${item.size_mb !== undefined ? item.size_mb.toFixed(2) : ((item.size / (1024 * 1024)).toFixed(2))}</td>
                    <td>${item.mtime_str || ""}</td>
                    <td>${serverLink}</td>
                    <td>
                      <div class="action-buttons">
                        <button type="button" class="layui-btn layui-btn-sm" onclick="window.open('${item.url}', '_blank')">下载</button>
                        ${uploadButton}
                        <button type="button" class="layui-btn layui-btn-sm layui-btn-warm" onclick="recognizeCutFile('${item.file_name}', this)">转文字</button>
                        <button type="button" class="layui-btn layui-btn-sm layui-btn-danger" onclick="deleteCutFile('${item.file_name}', this)">删除</button>
                      </div>
                      <div id="recognize_result_${item.file_name.replace(/[^a-zA-Z0-9]/g, '_')}" style="margin-top: 5px;"></div>
                    </td>
                  </tr>
                `;
                tbody.append(childRow);
              });
            });
          });
        }
        
        // 检查并更新分组的上传状态
        function checkAndUpdateGroupUploadStatus(groupId) {
          var $children = $(".child-row[data-group-id='" + groupId + "']");
          var allUploaded = true;
          $children.each(function() {
            var $uploadBtn = $(this).find("td:eq(7) button.layui-btn-normal");
            if ($uploadBtn.length > 0 && !$uploadBtn.hasClass("layui-btn-disabled")) {
              allUploaded = false;
              return false; // break
            }
          });
          
          // 如果所有文件都已上传，更新一级菜单按钮
          if (allUploaded && $children.length > 0) {
            var $groupRow = $(".tree-row[data-group-id='" + groupId + "']");
            if ($groupRow.length > 0) {
              var $uploadAllBtn = $groupRow.find("td:eq(7) button.layui-btn-normal");
              if ($uploadAllBtn.length > 0) {
                $uploadAllBtn.removeClass("layui-btn-normal").addClass("layui-btn-disabled");
                $uploadAllBtn.text("全部已上传");
                $uploadAllBtn.prop("disabled", true);
                $uploadAllBtn.off("click");
              }
            }
          }
        }
        
        // 展开/折叠分组
        window.toggleGroup = function(groupId) {
          var $children = $(".child-row[data-group-id='" + groupId + "']");
          var $icon = $("#icon_" + groupId);
          var $btnText = $("#btn_text_" + groupId);
          var $row = $("[data-group-id='" + groupId + "'].tree-row");
          
          if ($children.first().hasClass("show")) {
            // 折叠
            $children.removeClass("show");
            $icon.text("▶");
            $btnText.text("展开");
            $row.removeClass("expanded");
          } else {
            // 展开
            $children.addClass("show");
            $icon.text("▼");
            $btnText.text("折叠");
            $row.addClass("expanded");
          }
        }
        
        // 删除单个截取文件
        window.deleteCutFile = function(fileName, btn) {
          layer.confirm("确定要删除这个截取文件吗？", {
            icon: 3,
            title: "提示",
            btn: ["确定", "取消"]
          }, function(index) {
            layer.close(index);
            
            $.post("/delete_cut_file", {
              file_name: fileName
            }, function(res) {
              if (res.code === 0) {
                layer.msg(res.msg || "删除成功", { icon: 1, time: 1500 });
                // 从表格中移除该行
                if (btn) {
                  var $tr = $(btn).closest("tr");
                  $tr.remove();
                  // 如果该分组下没有子项了，也删除分组行
                  var groupId = $tr.attr("data-group-id");
                  if (groupId) {
                    var $groupRow = $("[data-group-id='" + groupId + "'].tree-row");
                    var remainingChildren = $(".child-row[data-group-id='" + groupId + "']");
                    if (remainingChildren.length === 0) {
                      $groupRow.remove();
                    } else {
                      // 更新分组统计信息
                      var newCount = remainingChildren.length;
                      $groupRow.find("td:eq(1)").html('<span style="color: #999; font-size: 12px;">共 ' + newCount + ' 个截取片段</span>');
                    }
                  }
                } else {
                  // 兜底：重新加载历史
                  loadHistory();
                }
              } else {
                layer.msg(res.msg || "删除失败", { icon: 2, time: 2000 });
              }
            }).fail(function() {
              layer.msg("删除失败，请检查网络或服务器", { icon: 2, time: 2000 });
            });
          });
        }
        
        // 删除整个分组（删除该录音的所有截取片段）
        window.deleteGroup = function(originalName, groupId) {
          layer.confirm("确定要删除该录音的所有截取片段吗？此操作不可恢复！", {
            icon: 3,
            title: "警告",
            btn: ["确定", "取消"]
          }, function(index) {
            layer.close(index);
            
            // 获取该分组下的所有文件
            var $children = $(".child-row[data-group-id='" + groupId + "']");
            var filesToDelete = [];
            $children.each(function() {
              var fileName = $(this).find("td:eq(1)").text();
              filesToDelete.push(fileName);
            });
            
            if (filesToDelete.length === 0) {
              layer.msg("没有可删除的文件", { icon: 0, time: 1500 });
              return;
            }
            
            // 逐个删除文件
            var deletedCount = 0;
            var failedCount = 0;
            var totalCount = filesToDelete.length;
            
            layer.load(2, { content: "正在删除..." });
            
            function deleteNext(index) {
              if (index >= filesToDelete.length) {
                layer.closeAll("loading");
                if (failedCount === 0) {
                  layer.msg("成功删除 " + deletedCount + " 个文件", { icon: 1, time: 2000 });
                  // 删除分组行
                  $("[data-group-id='" + groupId + "']").remove();
                  // 如果表格空了，显示提示
                  if ($("#history-table tbody tr").length === 0) {
                    $("#history-table tbody").append("<tr><td colspan='8'>暂无记录</td></tr>");
                  }
                } else {
                  layer.msg("删除完成，成功: " + deletedCount + "，失败: " + failedCount, { icon: 0, time: 2000 });
                  loadHistory(); // 重新加载以更新统计
                }
                return;
              }
              
              $.post("/delete_cut_file", {
                file_name: filesToDelete[index]
              }, function(res) {
                if (res.code === 0) {
                  deletedCount++;
                } else {
                  failedCount++;
                }
                deleteNext(index + 1);
              }).fail(function() {
                failedCount++;
                deleteNext(index + 1);
              });
            }
            
            deleteNext(0);
          });
        }
        
        // 添加上传日志
        function addUploadLog(message, type) {
          var $logsContent = $("#upload-logs-content");
          var now = new Date();
          var timeStr = now.toLocaleTimeString() + "." + String(now.getMilliseconds()).padStart(3, '0');
          var typeClass = type || 'info';
          var $logLine = $('<div class="log-line"></div>');
          $logLine.append('<span class="log-time">[' + timeStr + ']</span>');
          $logLine.append('<span class="log-' + typeClass + '">' + message + '</span>');
          $logsContent.append($logLine);
          // 自动滚动到底部
          $logsContent.scrollTop($logsContent[0].scrollHeight);
          // 显示日志容器
          $("#upload-logs-container").addClass("active");
        }
        
        // 清空上传日志
        window.clearUploadLogs = function() {
          $("#upload-logs-content").empty();
        }
        
        // 上传单个截取文件
        window.uploadCutFile = function(fileName, btn) {
          addUploadLog("开始上传文件: " + fileName, "info");
          
          var formData = new FormData();
          formData.append("file_name", fileName);
          
          fetch("/upload_cut_file_to_server", {
            method: "POST",
            body: formData
          }).then(function(response) {
            if (!response.ok) {
              throw new Error("HTTP " + response.status);
            }
            
            var reader = response.body.getReader();
            var decoder = new TextDecoder();
            var buffer = "";
            
            function readStream() {
              reader.read().then(function(result) {
                if (result.done) {
                  return;
                }
                
                buffer += decoder.decode(result.value, { stream: true });
                var lines = buffer.split("\n");
                buffer = lines.pop(); // 保留最后一行（可能不完整）
                
                for (var i = 0; i < lines.length; i++) {
                  var line = lines[i].trim();
                  if (!line) continue;
                  
                  if (line.startsWith("data: ")) {
                    var data = line.substring(6);
                    addUploadLog(data, "info");
                  } else if (line.startsWith("event: end")) {
                    // 下一行应该是 data: {...}
                    if (i + 1 < lines.length) {
                      var nextLine = lines[i + 1];
                      if (nextLine.startsWith("data: ")) {
                        try {
                          var endData = JSON.parse(nextLine.substring(6));
                          if (endData.code === 0) {
                            addUploadLog("上传成功: " + fileName, "success");
                            if (endData.data && endData.data.download_url) {
                              addUploadLog("下载链接: " + endData.data.download_url, "success");
                            }
                            layer.msg("上传成功", { icon: 1, time: 2000 });
                            // 上传成功后重新加载历史记录，以显示服务器链接
                            setTimeout(function() {
                              loadHistory();
                            }, 500);
                          } else {
                            addUploadLog("上传失败: " + endData.msg, "error");
                            layer.msg("上传失败: " + endData.msg, { icon: 2, time: 3000 });
                          }
                        } catch (e) {
                          addUploadLog("解析响应失败: " + e.message, "error");
                        }
                        i++; // 跳过下一行
                      }
                    }
                  }
                }
                
                readStream();
              }).catch(function(error) {
                addUploadLog("读取流失败: " + error.message, "error");
                layer.msg("上传失败: " + error.message, { icon: 2, time: 3000 });
              });
            }
            
            readStream();
          }).catch(function(error) {
            addUploadLog("上传错误: " + error.message, "error");
            layer.msg("上传失败: " + error.message, { icon: 2, time: 3000 });
          });
        }
        
        // 上传整个分组（批量上传）
        window.uploadGroup = function(originalName, groupId) {
          layer.confirm("确定要上传该录音的所有截取片段吗？", {
            icon: 3,
            title: "提示",
            btn: ["确定", "取消"]
          }, function(index) {
            layer.close(index);
            
            // 获取该分组下的所有文件（只获取未上传的）
            var $children = $(".child-row[data-group-id='" + groupId + "']");
            var filesToUpload = [];
            var skippedCount = 0;
            $children.each(function() {
              var $row = $(this);
              var fileName = $row.find("td:eq(1)").text();
              // 检查上传按钮是否被禁用（已上传）
              var $uploadBtn = $row.find("td:eq(6) button.layui-btn-normal");
              if ($uploadBtn.length === 0 || $uploadBtn.hasClass("layui-btn-disabled")) {
                skippedCount++;
              } else {
                filesToUpload.push(fileName);
              }
            });
            
            if (filesToUpload.length === 0) {
              if (skippedCount > 0) {
                layer.msg("所有文件已上传，无需重复上传", { icon: 0, time: 2000 });
              } else {
                layer.msg("没有可上传的文件", { icon: 0, time: 1500 });
              }
              return;
            }
            
            if (skippedCount > 0) {
              addUploadLog("跳过已上传的文件: " + skippedCount + " 个", "info");
            }
            addUploadLog("开始批量上传，共 " + filesToUpload.length + " 个文件", "info");
            
            // 逐个上传文件
            var uploadedCount = 0;
            var failedCount = 0;
            var totalCount = filesToUpload.length;
            
            function uploadNext(index) {
              if (index >= filesToUpload.length) {
                addUploadLog("批量上传完成，成功: " + uploadedCount + "，失败: " + failedCount, 
                            failedCount === 0 ? "success" : "error");
                layer.msg("批量上传完成，成功: " + uploadedCount + "，失败: " + failedCount, 
                         { icon: failedCount === 0 ? 1 : 0, time: 3000 });
                // 批量上传成功后重新加载历史记录，以显示服务器链接
                if (uploadedCount > 0) {
                  setTimeout(function() {
                    loadHistory();
                  }, 500);
                }
                return;
              }
              
              var fileName = filesToUpload[index];
              addUploadLog("正在上传 (" + (index + 1) + "/" + totalCount + "): " + fileName, "info");
              
              var formData = new FormData();
              formData.append("file_name", fileName);
              
              fetch("/upload_cut_file_to_server", {
                method: "POST",
                body: formData
              }).then(function(response) {
                if (!response.ok) {
                  throw new Error("HTTP " + response.status);
                }
                
                var reader = response.body.getReader();
                var decoder = new TextDecoder();
                var buffer = "";
                
                function readStream() {
                  reader.read().then(function(result) {
                    if (result.done) {
                      // 这个文件上传完成，继续下一个
                      uploadNext(index + 1);
                      return;
                    }
                    
                    buffer += decoder.decode(result.value, { stream: true });
                    var lines = buffer.split("\n");
                    buffer = lines.pop();
                    
                    for (var i = 0; i < lines.length; i++) {
                      var line = lines[i].trim();
                      if (!line) continue;
                      
                      if (line.startsWith("data: ")) {
                        var data = line.substring(6);
                        // 只显示重要日志
                        if (data.includes("上传完成") || data.includes("上传失败") || data.includes("处理失败")) {
                          addUploadLog(data, data.includes("失败") ? "error" : "info");
                        }
                      } else if (line.startsWith("event: end")) {
                        if (i + 1 < lines.length) {
                          var nextLine = lines[i + 1];
                          if (nextLine.startsWith("data: ")) {
                            try {
                              var endData = JSON.parse(nextLine.substring(6));
                              if (endData.code === 0) {
                                uploadedCount++;
                                addUploadLog("✓ " + fileName + " 上传成功", "success");
                                // 更新按钮状态为"已上传"
                                var $row = $(".child-row").filter(function() {
                                  return $(this).find("td:eq(1)").text() === fileName;
                                });
                              } else {
                                failedCount++;
                                addUploadLog("✗ " + fileName + " 上传失败: " + endData.msg, "error");
                              }
                            } catch (e) {
                              // 继续读取
                            }
                            i++;
                          }
                        }
                      }
                    }
                    
                    readStream();
                  }).catch(function(error) {
                    failedCount++;
                    addUploadLog("✗ " + fileName + " 上传失败: " + error.message, "error");
                    uploadNext(index + 1);
                  });
                }
                
                readStream();
              }).catch(function(error) {
                failedCount++;
                addUploadLog("✗ " + fileName + " 上传失败: " + error.message, "error");
                uploadNext(index + 1);
              });
            }
            
            uploadNext(0);
          });
        }

      // 转文字功能
      window.recognizeCutFile = function(fileName, btn) {
        var resultDivId = "recognize_result_" + fileName.replace(/[^a-zA-Z0-9]/g, '_');
        var $resultDiv = $("#" + resultDivId);
        
        // 显示日志区域
        $resultDiv.html('<div class="convert-logs" style="max-height: 200px; overflow-y: auto; background: #f5f5f5; padding: 10px; border-radius: 4px; margin-top: 5px;"><div class="log-line">开始转换...</div></div>');
        $resultDiv.show();
        
        // 禁用按钮
        if (btn) {
          $(btn).prop("disabled", true);
          $(btn).text("转换中...");
        }
        
        var formData = new FormData();
        formData.append("file_name", fileName);
        
        fetch("/cut_convert_to_text", {
          method: "POST",
          body: formData
        }).then(function(response) {
          if (!response.ok) {
            throw new Error("网络错误: " + response.status);
          }
          
          var reader = response.body.getReader();
          var decoder = new TextDecoder();
          var buffer = "";
          var $logsDiv = $resultDiv.find(".convert-logs");
          
          function readStream() {
            reader.read().then(function(result) {
              if (result.done) {
                return;
              }
              
              buffer += decoder.decode(result.value, { stream: true });
              var lines = buffer.split("\n");
              buffer = lines.pop();
              
              for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (!line) continue;
                
                if (line.startsWith("data: ")) {
                  var logMsg = line.substring(6);
                  $logsDiv.append('<div class="log-line">' + logMsg + '</div>');
                  $logsDiv.scrollTop($logsDiv[0].scrollHeight);
                } else if (line.startsWith("event: end")) {
                  if (i + 1 < lines.length) {
                    var nextLine = lines[i + 1];
                    if (nextLine.startsWith("data: ")) {
                      try {
                        var endData = JSON.parse(nextLine.substring(6));
                        if (endData.code === 0) {
                          $logsDiv.append('<div class="log-line" style="color: green;">✓ 转换成功</div>');
                          // 显示下载按钮
                          if (endData.data && endData.data.word_url) {
                            $resultDiv.append(
                              '<div style="margin-top: 10px;">' +
                              '<a href="' + endData.data.word_url + '" download="' + endData.data.word_filename + '" class="layui-btn layui-btn-sm layui-btn-normal">下载 Word 文档</a>' +
                              '</div>'
                            );
                          }
                        } else {
                          $logsDiv.append('<div class="log-line" style="color: red;">✗ 转换失败: ' + endData.msg + '</div>');
                        }
                      } catch (e) {
                        console.error("解析结果失败:", e);
                      }
                    }
                  }
                  // 恢复按钮
                  if (btn) {
                    $(btn).prop("disabled", false);
                    $(btn).text("转文字");
                  }
                  return;
                }
              }
              
              readStream();
            }).catch(function(error) {
              $logsDiv.append('<div class="log-line" style="color: red;">✗ 错误: ' + error.message + '</div>');
              if (btn) {
                $(btn).prop("disabled", false);
                $(btn).text("转文字");
              }
            });
          }
          
          readStream();
        }).catch(function(error) {
          $resultDiv.find(".convert-logs").append('<div class="log-line" style="color: red;">✗ 请求失败: ' + error.message + '</div>');
          if (btn) {
            $(btn).prop("disabled", false);
            $(btn).text("转文字");
          }
        });
      };

      // 页面加载时拉一次历史记录
      loadHistory();
    });
  </script>
        </div>
      </div>
    </div>
  </body>
